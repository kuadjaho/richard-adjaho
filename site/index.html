<script>

document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById(b.dataset.p).classList.add('active');
});

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

document.getElementById('chrono').innerHTML = HERITAGE.chronologie_carriere.map(e => `
  <div class="card">
    <span class="badge">${esc(e.periode)}</span><span class="muted">${esc(e.type_periode)}</span>
    <h3>${esc(e.poste)}</h3>
    ${e.institution ? `<div class="muted">${esc(e.institution)}</div>` : ''}
    ${e.contexte_historique ? `<p style="font-size:.88rem">${esc(e.contexte_historique)}</p>` : ''}
    ${e.realisations_cles.length ? `<ul style="font-size:.88rem;margin:6px 0">${e.realisations_cles.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>` : ''}
    ${e.textes_loi_associes.map(t=>`<div class="muted">📜 <a href="${t.url_source}" target="_blank">${esc(t.reference)}</a> — ${esc(t.titre)} <span class="badge ${t.statut_verification==='verifie'?'ok':'warn'}">${t.statut_verification}</span></div>`).join('')}
    ${e.citations_presse.map(c=>`<blockquote>« ${esc(c.texte)} »<br><span class="muted">— ${esc(c.auteur||c.source)}, ${esc(c.source)} (${esc(c.date||'')})</span></blockquote>`).join('')}
  </div>`).join('');

document.getElementById('biblio').innerHTML = HERITAGE.bibliographie.map(o => `
  <div class="card">
    <span class="badge">${esc(o.annee)}</span>
    <h3>${esc(o.titre)}</h3>
    <div class="muted">${esc(o.editeur)}${o.lieu?', '+esc(o.lieu):''} · ${o.pages||'?'} p.${o.isbn?' · ISBN '+esc(o.isbn):''}${o.co_auteur?' · avec '+esc(o.co_auteur):''}</div>
    <p style="font-size:.88rem">${esc(o.resume_analytique)}</p>
    <div>${o.piliers_gouvernance.map(p=>`<span class="badge">${esc(p)}</span>`).join(' ')}</div>
  </div>`).join('');

document.getElementById('hommages').innerHTML = HERITAGE.archives_hommages.map(h => `
  <div class="card">
    <span class="badge">${esc(h.date_publication)}</span> <strong>${esc(h.source)}</strong>
    <h3 style="font-size:.95rem">${esc(h.titre_article)}</h3>
    ${h.auteur?`<div class="muted">par ${esc(h.auteur)}</div>`:''}
    <blockquote>${esc(h.extrait_citation)}</blockquote>
    <a href="${h.url_origine}" target="_blank" style="font-size:.8rem">${esc(h.url_origine)}</a>
  </div>`).join('');

document.getElementById('photos').innerHTML =
  `<p class="muted">${esc(PHOTOS.note)}</p><table><tr><th>#</th><th>Description (alt)</th><th>Source / crédit</th><th>Statut</th></tr>` +
  PHOTOS.photos.map(p=>`<tr><td>${p.rang}</td><td>${esc(p.description_alt)}${p.url_image?`<br><a href="${p.url_image}" target="_blank" style="font-size:.75rem">${esc(p.url_image)}</a>`:''}</td><td style="font-size:.8rem">${esc(p.credit)}</td><td><span class="badge ${p.statut==='confirmee'?'ok':'warn'}">${esc(p.statut)}</span></td></tr>`).join('') + '</table>';

document.getElementById('jsonpre').textContent = JSON.stringify(HERITAGE, null, 2);

function copyJson(){ navigator.clipboard.writeText(JSON.stringify(HERITAGE, null, 2)); }
function dl(name, obj){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)], {type:'application/json'}));
  a.download = name; a.click();
}
